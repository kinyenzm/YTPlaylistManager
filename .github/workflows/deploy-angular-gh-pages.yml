name: Deploy Angular to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-angular-gh-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  FRONTEND_DIR: frontend
  BASE_HREF: /YTPlaylistManager/

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Build Angular app
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npx ng build --configuration production --base-href $BASE_HREF

      - name: Prepare artifact
        run: |
          set -euo pipefail
          mkdir -p _site
          browser_dir="$(find dist -type d -name browser | head -n 1 || true)"
          if [ -n "$browser_dir" ]; then
            cp -a "$browser_dir"/. _site/
          else
            first_dist="$(find dist -mindepth 1 -maxdepth 1 -type d | head -n 1)"
            cp -a "$first_dist"/. _site/
          fi
          cp _site/index.html _site/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
